<!-- 
Este é um exemplo básico de frontend para um sistema de cadastro e login.
O backend Node.js/Express seria responsável pelas rotas reais, persistência e autenticação dos dados.
Exemplo mínimo para integração server-side.
-->
<div class="auth-container">
    <h2>Cadastro / Login</h2>
    <form id="authForm">
        <label for="username">Usuário:</label>
        <input type="text" id="username" name="username" required autocomplete="username">
        
        <label for="password">Senha:</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
        
        <button type="submit">Entrar / Registrar</button>
    </form>
    <div id="authMessage"></div>
</div>

<div class="user-info" id="userInfo" style="display:none;">
    <h3>Olá, <span id="loggedUsername"></span>!</h3>
    <form id="nameForm">
        <label for="displayName">Seu Nome:</label>
        <input type="text" id="displayName" name="displayName" required>
        <button type="submit">Salvar Nome</button>
    </form>
    <div id="nameMessage"></div>
    <button onclick="logout()">Sair</button>
</div>

<script>
document.getElementById('authForm').onsubmit = async function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const res = await fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    const msgDiv = document.getElementById('authMessage');
    if (data.success) {
        document.querySelector('.auth-container').style.display = 'none';
        document.getElementById('userInfo').style.display = '';
        document.getElementById('loggedUsername').textContent = username;
        fetchDisplayName();
        msgDiv.textContent = '';
    } else {
        msgDiv.style.color = 'red';
        msgDiv.textContent = data.message || 'Erro no login/registro.';
    }
};

async function fetchDisplayName() {
    const res = await fetch('/api/name');
    const data = await res.json();
    if (data.displayName)
        document.getElementById('displayName').value = data.displayName;
    else
        document.getElementById('displayName').value = '';
}

document.getElementById('nameForm').onsubmit = async function(e) {
    e.preventDefault();
    const displayName = document.getElementById('displayName').value;
    const res = await fetch('/api/name', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ displayName })
    });
    const data = await res.json();
    const msgDiv = document.getElementById('nameMessage');
    if (data.success) {
        msgDiv.style.color = 'green';
        msgDiv.textContent = 'Nome salvo!';
    } else {
        msgDiv.style.color = 'red';
        msgDiv.textContent = data.message || 'Erro ao salvar o nome.';
    }
};

function logout() {
    fetch('/api/logout', {method:'POST'}).then(() => {
        document.querySelector('.auth-container').style.display = '';
        document.getElementById('userInfo').style.display = 'none';
        document.getElementById('authForm').reset();
        document.getElementById('nameForm').reset();
        document.getElementById('authMessage').textContent = '';
        document.getElementById('nameMessage').textContent = '';
    });
}

// Tente checar se já está logado, ao iniciar
window.onload = function() {
    fetch('/api/name').then(async resp => {
        if (resp.ok) {
            const data = await resp.json();
            if (data.username) {
                document.querySelector('.auth-container').style.display = 'none';
                document.getElementById('userInfo').style.display = '';
                document.getElementById('loggedUsername').textContent = data.username;
                document.getElementById('displayName').value = data.displayName || '';
            }
        }
    });
}
</script>
